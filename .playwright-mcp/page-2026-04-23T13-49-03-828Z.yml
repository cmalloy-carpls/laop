            - list [ref=e1607]:
              - listitem [ref=e1608]:
                - code [ref=e1609]: custom_results
                - text: is now an available parameter in all v2 endpoints. This will allow you to control the response. If you do not specify it at all, you will get the existing full resposne. If you specify
                - code [ref=e1610]: "\"custom_results\":[]"
                - text: the only thing returned will be the item UUID. If you specify
                - code [ref=e1611]: "\"custom_results\":[\"first\",\"last\"]"
                - text: then you would get the UUID, first, and last names. This will let you have more explicit and relevant API results. In a POST or PATCH API, it should be included in the body of the request. In a GET or SEARCH API, it should be included in the query parameters.
