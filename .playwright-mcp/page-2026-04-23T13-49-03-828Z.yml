                - text: There are now three new permissions -
                - code [ref=e2382]: API Get/Search Matter Full Results
                - text: ","
                - code [ref=e2383]: API Get/Search Matter Pro Bono Results
                - text: ","
                - code [ref=e2384]: API Get/Search Matter Caller ID Results
                - text: . These now allow for site administrator control over what an API user can receive with more granularity. These were created and enabled true only where a user role already had the
                - code [ref=e2385]: API Get Matter
                - text: or the
                - code [ref=e2386]: API Search Matter
                - text: permissions. This also means that the
                - code [ref=e2387]: results
                - text: parameter will now apply to the GET Matter Details endpoint instead of just the SEARCH matters endpoint. Also, the
